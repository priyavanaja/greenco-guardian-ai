version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: greenco_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: greenco_guardian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d greenco_guardian"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: greenco_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: greenco_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/greenco_guardian
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretenterprisekeyforgreencoguardianai2026
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: greenco_celery_worker
    command: celery -A app.workers.celery_worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/greenco_guardian
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretenterprisekeyforgreencoguardianai2026
      - ALGORITHM=HS256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
